# /etc/nginx/sites-available/fires.nijemtech.com
server {
    listen 80;
    server_name fires.nijemtech.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name fires.nijemtech.com;

    ssl_certificate /etc/letsencrypt/live/fires.nijemtech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fires.nijemtech.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/firewatcher/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Map tiles can be cached aggressively.
    location ~* \.(?:js|css|woff2?|svg|png|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
